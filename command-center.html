                  <h3 className="font-bold text-white">Checklist</h3>
                  <button type="button" onClick={()=>{ dispatch({type:"BULK_COMPLETE",taskId:task.id}); push("All checklist items marked done",{tone:"success"}); }} className="inline-flex items-center gap-1 rounded-lg border border-white/10 bg-white/5 px-2 py-1 text-xs font-bold text-slate-200 hover:bg-white/10">
                    <ListChecks className="h-3.5 w-3.5"/>Mark all done
                  </button>
                </div>
                <div className="mt-3 space-y-2">
                  {task.checklist.map(item => (
                    <ChecklistRow key={item.id} item={item}
                      onToggle={()=>dispatch({type:"TOGGLE_CHECK",taskId:task.id,checkId:item.id})}
                      onRename={text=>dispatch({type:"RENAME_CHECK",taskId:task.id,checkId:item.id,text})}
                      onRemove={()=>dispatch({type:"REMOVE_CHECK",taskId:task.id,checkId:item.id})}/>
                  ))}
                  {!task.checklist.length && <p className="rounded-xl border border-dashed border-white/10 p-3 text-sm text-slate-500">No checklist items yet.</p>}
                </div>
                <form onSubmit={addCheck} className="mt-3 flex gap-2">
                  <input value={newCheck} onChange={e=>setNewCheck(e.target.value)} placeholder="Add checklist item and press Enter" className="flex-1 rounded-xl border border-white/10 bg-slate-950/80 px-3 py-2 text-sm text-slate-100 outline-none placeholder:text-slate-600 focus:border-white/30"/>
                  <button type="submit" className="inline-flex items-center gap-1 rounded-xl border border-white/10 bg-white/10 px-3 py-2 text-sm font-bold text-white hover:bg-white/15"><Plus className="h-4 w-4"/>Add</button>
                </form>
              </div>

              <div className="rounded-2xl border border-white/10 bg-white/[0.04] p-4">
                <h3 className="font-bold text-white">Required Sections</h3>
                <div className="mt-3 flex flex-wrap gap-2">
                  {task.sections.map(s => <Pill key={s} className="border-slate-500/30 bg-slate-800/70 text-slate-200">{s}</Pill>)}
                </div>
                <div className="mt-5">
                  <label className="text-sm font-bold text-white" htmlFor={`notes-${task.id}`}>Task Notes</label>
                  <textarea id={`notes-${task.id}`} value={task.notes||""} onChange={e=>dispatch({type:"UPDATE_TASK",id:task.id,patch:{notes:e.target.value}})} placeholder="Add task-specific notes here. These will be included in the Markdown export." className="mt-2 min-h-[180px] w-full rounded-2xl border border-white/10 bg-slate-950/80 p-3 text-sm text-slate-100 outline-none placeholder:text-slate-600 focus:border-white/30"/>
                </div>
              </div>
            </div>

            <div className="mt-5 flex flex-wrap items-center justify-between gap-3">
              <div className="flex flex-wrap gap-3">
                <button type="button" onClick={()=>setActiveTab("notes")} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/10 px-4 py-2 text-sm font-bold text-white hover:bg-white/15"><NotebookPen className="h-4 w-4"/>Add Export Note</button>
                <button type="button" onClick={async()=>{ const ok = await copyToClipboard(`${task.title}\n\n${task.summary}\n\nChecklist:\n${task.checklist.map(c=>`- [${c.done?"x":" "}] ${c.text}`).join("\n")}`); push(ok?"Task copied as Markdown":"Clipboard unavailable",{tone:ok?"success":"error"}); }} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-sm font-bold text-slate-200 hover:bg-white/10"><Copy className="h-4 w-4"/>Copy task</button>
              </div>
              <button type="button" onClick={()=>{ if (confirm(`Delete "${task.title}"? This can be undone with Ctrl+Z.`)) { dispatch({type:"DELETE_TASK",id:task.id}); push("Task deleted. Press Ctrl+Z to undo.",{tone:"info"}); } }} className="inline-flex items-center gap-2 rounded-2xl border border-red-400/20 bg-red-500/10 px-4 py-2 text-sm font-bold text-red-100 hover:bg-red-500/15"><Trash className="h-4 w-4"/>Delete task</button>
            </div>
          </div>
        );
      }

      /* ====================================================================
       * Command tab
       * ================================================================== */
      function CommandTab({ visibleTasks, activeTask, dispatch, push, setActiveTab, sortMode, filters }) {
        const [draggedId, setDraggedId] = useState(null);
        const [dragOverId, setDragOverId] = useState(null);
        const handleDragStart = useCallback((e, id) => { setDraggedId(id); e.dataTransfer.effectAllowed = "move"; try { e.dataTransfer.setData("text/plain", id); } catch {} }, []);
        const handleDragOver = useCallback((e, id) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; setDragOverId(id); }, []);
        const handleDrop = useCallback((e, targetId) => {
          e.preventDefault();
          const id = draggedId || e.dataTransfer.getData("text/plain");
          setDragOverId(null); setDraggedId(null);
          if (!id || id === targetId) return;
          dispatch({ type:"REORDER_TASK", draggedId: id, targetId });
        }, [draggedId, dispatch]);
        const draggable = sortMode === "manual" && !filters.search && filters.priority === "All" && filters.status === "All";

        return (
          <div className="grid gap-5 xl:grid-cols-[minmax(360px,0.95fr)_minmax(420px,1.15fr)]">
            <div className="space-y-3">
              <div className="rounded-3xl border border-white/10 bg-white/[0.05] p-4">
                <p className="text-xs font-bold uppercase tracking-[0.25em] text-slate-400">{draggable ? "Drag Priority Queue" : "Filtered View"}</p>
                <h2 className="mt-2 text-xl font-black text-white">{draggable ? "Move cards into the order you want to execute next." : "Sorted / filtered — clear filters to drag cards."}</h2>
                <p className="mt-2 text-sm text-slate-400">Drag cards or use the up/down buttons. Use <kbd className="rounded bg-white/10 px-1">Alt</kbd>+<kbd className="rounded bg-white/10 px-1">↑/↓</kbd> to reorder by keyboard. Your order saves automatically.</p>
              </div>
              {visibleTasks.map((task, index) => (
                <TaskCard key={task.id} task={task} index={index} active={task.id===activeTask?.id}
                  onSelect={id => dispatch({ type: "SET_ACTIVE_TASK", id })}
                  onMoveUp={id => dispatch({ type: "MOVE_TASK", id, direction: -1 })}
                  onMoveDown={id => dispatch({ type: "MOVE_TASK", id, direction: 1 })}
                  onDragStart={handleDragStart} onDragOver={handleDragOver} onDrop={handleDrop}
                  onDragEnd={() => { setDraggedId(null); setDragOverId(null); }}
                  dragTarget={dragOverId === task.id} draggable={draggable}/>
              ))}
              {!visibleTasks.length && <div className="rounded-3xl border border-dashed border-white/15 p-6 text-center text-sm text-slate-500">No tasks match the current filters.</div>}
            </div>
            <DetailPanel task={activeTask} dispatch={dispatch} push={push} setActiveTab={setActiveTab}/>
          </div>
        );
      }

      /* ====================================================================
       * Filtered grid (per-tab)
       * ================================================================== */
      function FilteredTaskGrid({ tasks, filter, activeTaskId, dispatch, push, setActiveTab }) {
        const visible = useMemo(() => tasks.filter(t => t.tab === filter).sort(sortByOrder), [tasks, filter]);
        const active = visible.find(t => t.id === activeTaskId) || visible[0];
        useEffect(() => {
          if (visible.length && !visible.some(t => t.id === activeTaskId)) dispatch({ type:"SET_ACTIVE_TASK", id: visible[0].id });
        }, [filter]);
        if (!visible.length) return <div className="rounded-3xl border border-dashed border-white/15 p-10 text-center text-sm text-slate-500">No tasks in this tab yet. Use the “New Task” button to add one.</div>;
        return (
          <div className="grid gap-5 xl:grid-cols-[minmax(280px,0.8fr)_minmax(420px,1.2fr)]">
            <div className="grid gap-3 md:grid-cols-2 xl:grid-cols-1">
              {visible.map(task => (
                <button key={task.id} type="button" onClick={()=>dispatch({type:"SET_ACTIVE_TASK",id:task.id})}
                  className={cx("rounded-3xl border p-4 text-left transition focus:outline-none focus-visible:ring-2 focus-visible:ring-white/40",
                    active?.id===task.id ? "border-white/30 bg-white/[0.12]" : "border-white/10 bg-white/[0.05] hover:bg-white/[0.08]")}
                  aria-pressed={active?.id===task.id}>
                  <div className="flex items-center gap-3">
                    <div className="rounded-2xl bg-white/10 p-2 text-white"><TaskIcon task={task} className="h-5 w-5"/></div>
                    <div className="min-w-0"><h3 className="truncate font-bold text-white">{task.shortTitle}</h3><p className="text-xs text-slate-400">Priority #{task.order}</p></div>
                  </div>
                  <div className="mt-3"><ProgressBar value={progressFor(task)} label={`${task.title} progress`}/></div>
                  <div className="mt-2 flex flex-wrap gap-1.5"><Pill className={priorityClass[task.priority]}>{task.priority}</Pill><DueChip task={task}/></div>
                  <p className="mt-3 line-clamp-2 text-sm text-slate-400">{task.summary}</p>
                </button>
              ))}
            </div>
            <DetailPanel task={active} dispatch={dispatch} push={push} setActiveTab={setActiveTab}/>
          </div>
        );
      }

      /* ====================================================================
       * Notes tab
       * ================================================================== */
      function NotesTab({ tasks, savedNotes, globalNotes, noteDraft, dispatch, push }) {
        const [query, setQuery] = useState("");
        const filtered = useMemo(() => {
          const q = query.trim().toLowerCase();
          if (!q) return savedNotes;
          return savedNotes.filter(n => n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q) || n.category.toLowerCase().includes(q));
        }, [savedNotes, query]);
        function saveNote() {
          if (!noteDraft.title.trim() && !noteDraft.body.trim()) { push("Note is empty",{tone:"error"}); return; }
          dispatch({ type:"ADD_NOTE", note: { id: uid(), title: noteDraft.title.trim()||"Untitled Note", category: noteDraft.category, body: noteDraft.body.trim(), createdAt: formatDateTime() } });
          dispatch({ type:"SET_NOTE_DRAFT", value: { title:"", category:"General", body:"" } });
          push("Note saved",{tone:"success"});
        }
        return (
          <div className="grid gap-5 xl:grid-cols-[minmax(420px,1fr)_minmax(360px,0.9fr)]">
            <div className="space-y-5">
              <div className="rounded-3xl border border-white/10 bg-white/[0.06] p-5">
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <p className="text-xs font-bold uppercase tracking-[0.25em] text-slate-400">Notes Workspace</p>
                    <h2 className="mt-2 text-2xl font-black text-white">Capture notes once. Export everything into one Markdown file.</h2>
                    <p className="mt-2 text-sm text-slate-400">Use this for bills, grocery info, appointment details, dashboard ideas, or raw thoughts you want preserved.</p>
                  </div>
                  <div className="rounded-3xl bg-white/10 p-4 text-white"><FileText className="h-8 w-8"/></div>
                </div>
                <div className="mt-5 grid gap-3 md:grid-cols-[1fr_200px]">
                  <input value={noteDraft.title} onChange={e=>dispatch({type:"SET_NOTE_DRAFT",value:{...noteDraft,title:e.target.value}})} placeholder="Note title" className="rounded-2xl border border-white/10 bg-slate-950/80 px-4 py-3 text-sm text-white outline-none placeholder:text-slate-600 focus:border-white/30"/>
                  <select value={noteDraft.category} onChange={e=>dispatch({type:"SET_NOTE_DRAFT",value:{...noteDraft,category:e.target.value}})} className="rounded-2xl border border-white/10 bg-slate-950/80 px-4 py-3 text-sm text-white outline-none focus:border-white/30">
                    {["General","Bills","Groceries","Car","Storage","Birthday","Dashboard Build","VA","Mental Health","Work Hub","Learning"].map(c => <option key={c}>{c}</option>)}
                  </select>
                </div>
                <textarea value={noteDraft.body} onChange={e=>dispatch({type:"SET_NOTE_DRAFT",value:{...noteDraft,body:e.target.value}})} placeholder="Paste messy raw info here. Save it, then export everything to Markdown when ready." className="mt-3 min-h-[180px] w-full rounded-2xl border border-white/10 bg-slate-950/80 p-4 text-sm leading-6 text-slate-100 outline-none placeholder:text-slate-600 focus:border-white/30"/>
                <div className="mt-3 flex flex-wrap gap-3">
                  <button type="button" onClick={saveNote} className="inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 text-sm font-black text-slate-950 hover:bg-slate-200"><Save className="h-4 w-4"/>Save Note</button>
                  <button type="button" onClick={()=>downloadMarkdown(tasks, savedNotes, globalNotes)} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/10 px-4 py-2 text-sm font-bold text-white hover:bg-white/15"><Download className="h-4 w-4"/>Export MD</button>
                  <button type="button" onClick={async()=>{ const ok = await copyToClipboard(buildMarkdown(tasks, savedNotes, globalNotes)); push(ok?"Markdown copied to clipboard":"Clipboard unavailable",{tone:ok?"success":"error"}); }} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/10 px-4 py-2 text-sm font-bold text-white hover:bg-white/15"><Copy className="h-4 w-4"/>Copy MD</button>
                  <button type="button" onClick={()=>window.print()} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/10 px-4 py-2 text-sm font-bold text-white hover:bg-white/15"><Printer className="h-4 w-4"/>Print</button>
                </div>
              </div>
              <div className="rounded-3xl border border-white/10 bg-white/[0.06] p-5">
                <h3 className="font-black text-white">Global Session Notes</h3>
                <p className="mt-1 text-sm text-slate-400">This block is always included in the Markdown export.</p>
                <textarea value={globalNotes} onChange={e=>dispatch({type:"SET_GLOBAL_NOTES",value:e.target.value})} placeholder="Add session-wide notes here." className="mt-3 min-h-[170px] w-full rounded-2xl border border-white/10 bg-slate-950/80 p-4 text-sm leading-6 text-slate-100 outline-none placeholder:text-slate-600 focus:border-white/30"/>
              </div>
            </div>
            <div className="rounded-3xl border border-white/10 bg-slate-950/70 p-5">
              <div className="flex items-center justify-between gap-3">
                <h3 className="text-xl font-black text-white">Saved Notes</h3>
                <span className="text-xs text-slate-500">{filtered.length} shown</span>
              </div>
              <div className="relative mt-3">
                <Search className="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-500"/>
                <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search notes" className="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-3 py-2 pl-9 text-sm text-white outline-none placeholder:text-slate-600 focus:border-white/30"/>
              </div>
              <div className="mt-4 space-y-3">
                {!filtered.length && <div className="rounded-2xl border border-dashed border-white/15 p-5 text-sm text-slate-500">{savedNotes.length ? "No notes match this search." : "No saved notes yet."}</div>}
                {filtered.map(note => (
                  <div key={note.id} className="rounded-2xl border border-white/10 bg-white/[0.05] p-4">
                    <div className="flex items-start justify-between gap-3">
                      <div className="min-w-0">
                        <Pill className="border-slate-500/30 bg-slate-800/70 text-slate-200">{note.category}</Pill>
                        <h4 className="mt-2 truncate font-bold text-white">{note.title}</h4>
                        <p className="mt-1 text-xs text-slate-500">{note.createdAt}</p>
                      </div>
                      <div className="flex gap-1">
                        <button type="button" onClick={async()=>{ const ok = await copyToClipboard(`# ${note.title}\n\n${note.body}`); push(ok?"Note copied":"Clipboard unavailable",{tone:ok?"success":"error"}); }} className="rounded-xl border border-white/10 bg-white/5 p-2 text-slate-400 hover:bg-white/10 hover:text-white" aria-label="Copy note"><Copy className="h-4 w-4"/></button>
                        <button type="button" onClick={()=>dispatch({type:"DELETE_NOTE",id:note.id})} className="rounded-xl border border-white/10 bg-white/5 p-2 text-slate-400 hover:bg-red-500/10 hover:text-red-200" aria-label="Delete note"><Trash className="h-4 w-4"/></button>
                      </div>
                    </div>
                    <p className="mt-3 whitespace-pre-wrap text-sm leading-6 text-slate-300">{note.body}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      /* ====================================================================
       * New task modal
       * ================================================================== */
      function NewTaskModal({ open, onClose, onCreate }) {
        const [draft, setDraft] = useState({ title:"", shortTitle:"", tab:"life-admin", icon:"ClipboardList", priority:"Medium", summary:"" });
        const titleRef = useRef(null);
        useEffect(() => { if (open) { setDraft({ title:"", shortTitle:"", tab:"life-admin", icon:"ClipboardList", priority:"Medium", summary:"" }); setTimeout(()=>titleRef.current?.focus(), 30); } }, [open]);
        if (!open) return null;
        function submit(e) {
          e.preventDefault();
          if (!draft.title.trim()) return;
          onCreate({ id: uid(), order: 9999, title: draft.title.trim(), shortTitle: draft.shortTitle.trim()||draft.title.trim().slice(0,18), tab: draft.tab, icon: draft.icon, status: "Queued", priority: draft.priority, dueDate: "", lockedReason: "", summary: draft.summary.trim(), sections: [], checklist: [], notes: "" });
          onClose();
        }
        return (
          <div role="dialog" aria-modal="true" aria-label="New task" className="fixed inset-0 z-40 flex items-center justify-center bg-slate-950/70 p-4 backdrop-blur" onClick={onClose}>
            <form onSubmit={submit} onClick={e=>e.stopPropagation()} className="pop-in w-full max-w-xl rounded-3xl border border-white/10 bg-slate-950 p-6 shadow-2xl">
              <div className="flex items-center justify-between"><h2 className="text-xl font-black text-white">Add a new task</h2><button type="button" onClick={onClose} className="rounded-xl p-1 text-slate-400 hover:text-white" aria-label="Close"><X className="h-5 w-5"/></button></div>
              <div className="mt-4 grid gap-3">
                <label className="text-xs font-bold uppercase tracking-wider text-slate-400">Title<input ref={titleRef} value={draft.title} onChange={e=>setDraft({...draft,title:e.target.value})} required className="mt-1 w-full rounded-xl border border-white/10 bg-slate-900 px-3 py-2 text-sm text-white outline-none focus:border-white/30"/></label>
                <label className="text-xs font-bold uppercase tracking-wider text-slate-400">Short title<input value={draft.shortTitle} onChange={e=>setDraft({...draft,shortTitle:e.target.value})} className="mt-1 w-full rounded-xl border border-white/10 bg-slate-900 px-3 py-2 text-sm text-white outline-none focus:border-white/30"/></label>
                <div className="grid gap-3 md:grid-cols-3">
                  <label className="text-xs font-bold uppercase tracking-wider text-slate-400">Tab<select value={draft.tab} onChange={e=>setDraft({...draft,tab:e.target.value})} className="mt-1 w-full rounded-xl border border-white/10 bg-slate-900 px-3 py-2 text-sm text-white outline-none focus:border-white/30">{tabs.filter(t=>t.id!=="command"&&t.id!=="notes").map(t => <option key={t.id} value={t.id}>{t.label}</option>)}</select></label>
                  <label className="text-xs font-bold uppercase tracking-wider text-slate-400">Icon<select value={draft.icon} onChange={e=>setDraft({...draft,icon:e.target.value})} className="mt-1 w-full rounded-xl border border-white/10 bg-slate-900 px-3 py-2 text-sm text-white outline-none focus:border-white/30">{iconNames.map(n => <option key={n}>{n}</option>)}</select></label>
                  <label className="text-xs font-bold uppercase tracking-wider text-slate-400">Priority<select value={draft.priority} onChange={e=>setDraft({...draft,priority:e.target.value})} className="mt-1 w-full rounded-xl border border-white/10 bg-slate-900 px-3 py-2 text-sm text-white outline-none focus:border-white/30">{PRIORITIES.map(p => <option key={p}>{p}</option>)}</select></label>
                </div>
                <label className="text-xs font-bold uppercase tracking-wider text-slate-400">Summary<textarea value={draft.summary} onChange={e=>setDraft({...draft,summary:e.target.value})} rows={3} className="mt-1 w-full rounded-xl border border-white/10 bg-slate-900 px-3 py-2 text-sm text-white outline-none focus:border-white/30"/></label>
              </div>
              <div className="mt-5 flex justify-end gap-2"><button type="button" onClick={onClose} className="rounded-xl border border-white/10 bg-white/5 px-4 py-2 text-sm font-bold text-slate-200 hover:bg-white/10">Cancel</button><button type="submit" className="inline-flex items-center gap-2 rounded-xl bg-white px-4 py-2 text-sm font-black text-slate-950 hover:bg-slate-200"><Plus className="h-4 w-4"/>Create task</button></div>
            </form>
          </div>
        );
      }

      /* ====================================================================
       * Command palette
       * ================================================================== */
      function CommandPalette({ open, onClose, tasks, dispatch, setActiveTab }) {
        const [q, setQ] = useState("");
        const inputRef = useRef(null);
        useEffect(() => { if (open) { setQ(""); setTimeout(()=>inputRef.current?.focus(), 20); } }, [open]);
        const results = useMemo(() => {
          const t = q.trim().toLowerCase();
          if (!t) return [...tasks].sort(sortByOrder).slice(0,8);
          return tasks.filter(x => x.title.toLowerCase().includes(t) || x.shortTitle.toLowerCase().includes(t) || x.summary.toLowerCase().includes(t)).slice(0,10);
        }, [q, tasks]);
        if (!open) return null;
        function pick(task) { dispatch({ type:"SET_ACTIVE_TASK", id: task.id }); setActiveTab(task.tab==="command"?"command":task.tab); onClose(); }
        return (
          <div role="dialog" aria-modal="true" aria-label="Command palette" onClick={onClose} className="fixed inset-0 z-40 flex items-start justify-center bg-slate-950/70 p-4 pt-24 backdrop-blur">
            <div onClick={e=>e.stopPropagation()} className="pop-in w-full max-w-xl overflow-hidden rounded-3xl border border-white/10 bg-slate-950 shadow-2xl">
              <div className="flex items-center gap-2 border-b border-white/10 p-3">
                <Search className="h-4 w-4 text-slate-400"/>
                <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Jump to task…" className="flex-1 bg-transparent text-sm text-white outline-none placeholder:text-slate-500" onKeyDown={e=>{ if (e.key==="Escape") onClose(); if (e.key==="Enter" && results[0]) pick(results[0]); }}/>
                <kbd className="rounded bg-white/10 px-1.5 py-0.5 text-slate-300">Esc</kbd>
              </div>
              <ul className="max-h-80 overflow-auto p-2">
                {results.map(task => (
                  <li key={task.id}>
                    <button type="button" onClick={()=>pick(task)} className="flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left hover:bg-white/10">
                      <div className="rounded-lg bg-white/10 p-1.5 text-white"><TaskIcon task={task} className="h-4 w-4"/></div>
                      <div className="min-w-0 flex-1"><p className="truncate text-sm font-bold text-white">{task.title}</p><p className="truncate text-xs text-slate-400">{task.priority} · {task.status}</p></div>
                      <Pill className="border-white/10 bg-white/5 text-slate-300">#{task.order}</Pill>
                    </button>
                  </li>
                ))}
                {!results.length && <li className="px-3 py-6 text-center text-sm text-slate-500">No matches.</li>}
              </ul>
            </div>
          </div>
        );
      }

      /* ====================================================================
       * Toolbar
       * ================================================================== */
      function Toolbar({ filters, sortMode, dispatch }) {
        return (
          <div className="rounded-2xl border border-white/10 bg-white/[0.04] p-3">
            <div className="flex flex-wrap items-center gap-2">
              <div className="relative min-w-[200px] flex-1">
                <Search className="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-500"/>
                <input value={filters.search} onChange={e=>dispatch({type:"SET_FILTERS",value:{search:e.target.value}})} placeholder="Search tasks, notes, summaries…" className="w-full rounded-xl border border-white/10 bg-slate-950/80 px-3 py-2 pl-9 text-sm text-white outline-none placeholder:text-slate-600 focus:border-white/30" aria-label="Search tasks"/>
              </div>
              <label className="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-2 py-1.5 text-xs text-slate-300"><Filter className="h-3.5 w-3.5"/>Priority<select value={filters.priority} onChange={e=>dispatch({type:"SET_FILTERS",value:{priority:e.target.value}})} className="bg-transparent text-xs font-bold text-white outline-none">{["All",...PRIORITIES].map(p => <option key={p} className="bg-slate-900">{p}</option>)}</select></label>
              <label className="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-2 py-1.5 text-xs text-slate-300"><Eye className="h-3.5 w-3.5"/>Status<select value={filters.status} onChange={e=>dispatch({type:"SET_FILTERS",value:{status:e.target.value}})} className="bg-transparent text-xs font-bold text-white outline-none">{["All","Open","Blocked","Complete"].map(s => <option key={s} className="bg-slate-900">{s}</option>)}</select></label>
              <label className="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-2 py-1.5 text-xs text-slate-300"><Sparkles className="h-3.5 w-3.5"/>Sort<select value={sortMode} onChange={e=>dispatch({type:"SET_SORT_MODE",value:e.target.value})} className="bg-transparent text-xs font-bold text-white outline-none"><option value="manual" className="bg-slate-900">Manual</option><option value="priority" className="bg-slate-900">Priority</option><option value="progress" className="bg-slate-900">Least progress</option><option value="due" className="bg-slate-900">Due date</option></select></label>
              {(filters.search || filters.priority!=="All" || filters.status!=="All" || sortMode!=="manual") && (
                <button type="button" onClick={()=>{ dispatch({type:"SET_FILTERS",value:{search:"",priority:"All",status:"All"}}); dispatch({type:"SET_SORT_MODE",value:"manual"}); }} className="inline-flex items-center gap-1 rounded-xl border border-white/10 bg-white/5 px-2 py-1.5 text-xs font-bold text-slate-200 hover:bg-white/10"><X className="h-3.5 w-3.5"/>Clear</button>
              )}
            </div>
          </div>
        );
      }

      /* ====================================================================
       * Error boundary
       * ================================================================== */
      class ErrorBoundary extends React.Component {
        constructor(p) { super(p); this.state = { error: null }; }
        static getDerivedStateFromError(error) { return { error }; }
        componentDidCatch(error, info) { console.error("Dashboard error", error, info); }
        render() {
          if (this.state.error) {
            return (
              <div className="m-6 rounded-3xl border border-red-400/30 bg-red-500/10 p-6 text-red-100">
                <h2 className="text-lg font-black">Something went wrong</h2>
                <p className="mt-2 text-sm">{String(this.state.error?.message || this.state.error)}</p>
                <button type="button" onClick={()=>this.setState({error:null})} className="mt-4 rounded-xl bg-white px-3 py-2 text-sm font-black text-slate-950">Try again</button>
              </div>
            );
          }
          return this.props.children;
        }
      }

      /* ====================================================================
       * Hooks
       * ================================================================== */
      function useDebouncedEffect(callback, deps, delay) {
        useEffect(() => { const h = setTimeout(callback, delay); return () => clearTimeout(h); }, deps);
      }
      function useHotkey(combo, handler) {
        useEffect(() => {
          function onKey(e) {
            const tag = (e.target?.tagName || "").toLowerCase();
            const editing = ["input","textarea","select"].includes(tag) || e.target?.isContentEditable;
            const wantsMeta = combo.includes("mod");
            const metaOk = !wantsMeta || e.metaKey || e.ctrlKey;
            const altOk = combo.includes("alt") ? e.altKey : true;
            const wantsShift = combo.includes("shift");
            const key = combo.split("+").pop();
            if (!metaOk || !altOk) return;
            if (wantsShift && !e.shiftKey) return;
            if (e.key.toLowerCase() !== key) return;
            if (editing && !wantsMeta && combo !== "escape") return;
            e.preventDefault();
            handler(e);
          }
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [combo, handler]);
      }

      /* ====================================================================
       * Root
       * ================================================================== */
      function App() {
        const [state, dispatch] = useReducer(reducer, undefined, init);
        const { tasks, activeTab, activeTaskId, globalNotes, noteDraft, savedNotes, focusMode, sortMode, filters, history } = state;
        const { toasts, dismiss, push } = useToastHost();
        const fileInputRef = useRef(null);

        useDebouncedEffect(() => {
          try {
            const { history: _h, ...persistable } = state;
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ schema: SCHEMA_VERSION, ...persistable }));
          } catch {}
        }, [state], AUTOSAVE_DEBOUNCE_MS);

        const sortedTasks = useMemo(() => [...tasks].sort(sortByOrder), [tasks]);
        const activeTask = tasks.find(t => t.id === activeTaskId) || sortedTasks[0] || null;
        const counts = useMemo(() => statusCounts(tasks), [tasks]);
        const nextTask = useMemo(() => sortedTasks.find(t => !isComplete(t)) || sortedTasks[0] || null, [sortedTasks]);
        const visibleTabs = useMemo(() => focusMode ? tabs.filter(t => t.id !== "learning") : tabs, [focusMode]);

        const filteredTasks = useMemo(() => {
          const q = filters.search.trim().toLowerCase();
          let list = tasks.filter(t => {
            if (filters.priority !== "All" && t.priority !== filters.priority) return false;
            if (filters.status === "Blocked" && !isBlocked(t)) return false;
            if (filters.status === "Complete" && !isComplete(t)) return false;
            if (filters.status === "Open" && (isBlocked(t) || isComplete(t))) return false;
            if (q && ![t.title, t.shortTitle, t.summary, t.status, t.notes].filter(Boolean).some(s => s.toLowerCase().includes(q))) return false;
            return true;
          });
          if (sortMode === "priority") list = list.sort((a,b) => priorityRank[a.priority] - priorityRank[b.priority] || a.order - b.order);
          else if (sortMode === "progress") list = list.sort((a,b) => progressFor(a) - progressFor(b) || a.order - b.order);
          else if (sortMode === "due") list = list.sort((a,b) => (a.dueDate || "9999-12-31").localeCompare(b.dueDate || "9999-12-31") || a.order - b.order);
          else list = list.sort(sortByOrder);
          return list;
        }, [tasks, filters, sortMode]);

        const setActiveTab = useCallback(tab => dispatch({ type:"SET_ACTIVE_TAB", tab }), []);
        const setFocusMode = useCallback(value => dispatch({ type:"SET_FOCUS_MODE", value }), []);
        const resetDashboard = useCallback(() => { if (!confirm("Reset everything? Notes and progress will be wiped.")) return; dispatch({ type:"RESET" }); push("Dashboard reset",{tone:"info"}); }, [push]);

        const handleImportFile = useCallback(async (file) => {
          try {
            const text = await file.text();
            const parsed = JSON.parse(text);
            const incoming = parsed.state || parsed;
            if (!Array.isArray(incoming.tasks)) throw new Error("Missing tasks array");
            dispatch({ type:"IMPORT", value: { tasks: incoming.tasks, savedNotes: incoming.savedNotes||[], globalNotes: incoming.globalNotes||"", noteDraft: incoming.noteDraft||defaultPrefs.noteDraft } });
            push("Imported successfully",{tone:"success"});
          } catch (err) { push(`Import failed: ${err.message}`,{tone:"error"}); }
        }, [push]);

        const [paletteOpen, setPaletteOpen] = useState(false);
        const [newTaskOpen, setNewTaskOpen] = useState(false);

        useHotkey("mod+k", () => setPaletteOpen(true));
        useHotkey("mod+z", () => dispatch({ type:"UNDO" }));
        useHotkey("mod+shift+z", () => dispatch({ type:"REDO" }));
        useHotkey("mod+y", () => dispatch({ type:"REDO" }));
        useHotkey("mod+e", () => { downloadMarkdown(tasks, savedNotes, globalNotes); push("Markdown exported",{tone:"success"}); });
        useHotkey("n", () => setNewTaskOpen(true));
        useHotkey("escape", () => { setPaletteOpen(false); setNewTaskOpen(false); });

        useEffect(() => {
          function onKey(e) {
            if (!e.altKey || !activeTask) return;
            if (e.key === "ArrowUp") { e.preventDefault(); dispatch({ type:"MOVE_TASK", id: activeTask.id, direction: -1 }); }
            else if (e.key === "ArrowDown") { e.preventDefault(); dispatch({ type:"MOVE_TASK", id: activeTask.id, direction: 1 }); }
          }
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [activeTask]);

        return (
          <ToastCtx.Provider value={push}>
            <ErrorBoundary>
              <main className="p-4 md:p-6">
                <div className="mx-auto max-w-7xl">
                  <section className="overflow-hidden rounded-[2rem] border border-white/10 bg-white/[0.04] shadow-2xl shadow-black/30 backdrop-blur">
                    <div className="relative p-5 md:p-8">
                      <div className="no-print absolute right-0 top-0 h-44 w-44 rounded-full bg-sky-400/20 blur-3xl"/>
                      <div className="no-print absolute bottom-0 left-20 h-44 w-44 rounded-full bg-violet-400/10 blur-3xl"/>
                      <div className="relative grid gap-6 lg:grid-cols-[1.3fr_0.7fr] lg:items-end">
                        <div>
                          <div className="flex flex-wrap gap-2">
                            <Pill className="border-white/10 bg-white/10 text-slate-200">Idea Hub</Pill>
                            <Pill className="border-emerald-300/30 bg-emerald-400/10 text-emerald-100">Autosaves locally</Pill>
                            <Pill className="border-amber-300/30 bg-amber-400/10 text-amber-100">Bills before groceries</Pill>
                            <Pill className="border-white/10 bg-white/10 text-slate-200"><Cmd className="mr-1 h-3 w-3"/>Ctrl/⌘+K</Pill>
                          </div>
                          <h1 className="mt-5 max-w-4xl text-4xl font-black tracking-tight text-white md:text-6xl">Life Admin + Dashboard Build Command Center</h1>
                          <p className="mt-4 max-w-3xl text-base leading-7 text-slate-300 md:text-lg">A movable command dashboard for bills, groceries, car scheduling, storage cleanup, birthday planning, dashboard builds, VA planning, mental health tracking, and event planning.</p>
                          <div className="mt-5 max-w-md">
                            <div className="mb-1 flex items-center justify-between text-xs text-slate-400"><span>Overall progress</span><span className="tabular-nums">{counts.total?Math.round((counts.complete/counts.total)*100):0}%</span></div>
                            <ProgressBar value={counts.total?Math.round((counts.complete/counts.total)*100):0} label="Overall completion"/>
                          </div>
                        </div>
                        <div className="rounded-3xl border border-white/10 bg-slate-950/60 p-5">
                          <p className="text-xs font-bold uppercase tracking-[0.25em] text-slate-400">Next Best Move</p>
                          <div className="mt-3 flex items-start gap-3">
                            <div className="rounded-2xl bg-white/10 p-3 text-white"><TaskIcon task={nextTask} className="h-6 w-6"/></div>
                            <div className="min-w-0"><h2 className="truncate font-black text-white">{nextTask?.title||"All clear"}</h2><p className="mt-1 truncate text-sm text-slate-400">{nextTask?.status||"Nothing pending"}</p></div>
                          </div>
                          <div className="mt-4 flex flex-wrap gap-2">
                            <button type="button" onClick={()=>{ if (!nextTask) return; dispatch({type:"SET_ACTIVE_TASK",id:nextTask.id}); setActiveTab("command"); }} disabled={!nextTask} className="rounded-2xl bg-white px-4 py-2 text-sm font-black text-slate-950 hover:bg-slate-200 disabled:opacity-40">Open Next Task</button>
                            <button type="button" onClick={()=>{ downloadMarkdown(tasks, savedNotes, globalNotes); push("Markdown exported",{tone:"success"}); }} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/10 px-4 py-2 text-sm font-bold text-white hover:bg-white/15"><Download className="h-4 w-4"/>Export MD</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </section>

                  <section className="mt-5 grid gap-4 md:grid-cols-2 xl:grid-cols-5">
                    <StatCard label="Total Items" value={counts.total} helper="All ideas converted into tracked work cards." icon={ClipboardList}/>
                    <StatCard tone="good" label="Completed" value={counts.complete} helper="Every checklist item checked." icon={CheckCircle2}/>
                    <StatCard tone="warn" label="Blocked" value={counts.blocked} helper="Waiting on missing info or dependencies." icon={AlertTriangle}/>
                    <StatCard tone="danger" label="Critical" value={counts.critical} helper="Must be handled before normal spending." icon={WalletCards}/>
                    <StatCard tone={counts.overdue?"danger":undefined} label="Overdue" value={counts.overdue} helper="Past due-date items." icon={Flame}/>
                  </section>

                  <section className="no-print mt-5 rounded-[2rem] border border-white/10 bg-white/[0.04] p-3 shadow-xl shadow-black/10">
                    <div className="flex flex-wrap items-center justify-between gap-3">
                      <div role="tablist" aria-label="Dashboard sections" className="flex flex-wrap gap-2">
                        {visibleTabs.map(tab => {
                          const Icon = tab.icon;
                          const isActive = activeTab === tab.id;
                          return (
                            <button key={tab.id} role="tab" aria-selected={isActive} type="button" onClick={()=>setActiveTab(tab.id)} className={cx("inline-flex items-center gap-2 rounded-2xl px-4 py-2 text-sm font-bold transition focus:outline-none focus-visible:ring-2 focus-visible:ring-white/40", isActive ? "bg-white text-slate-950" : "border border-white/10 bg-white/5 text-slate-300 hover:bg-white/10 hover:text-white")}><Icon className="h-4 w-4"/>{tab.label}</button>
                          );
                        })}
                      </div>
                      <div className="flex flex-wrap gap-2">
                        <button type="button" onClick={()=>setNewTaskOpen(true)} className="inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 text-sm font-black text-slate-950 hover:bg-slate-200"><Plus className="h-4 w-4"/>New Task</button>
                        <button type="button" onClick={()=>setPaletteOpen(true)} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-sm font-bold text-slate-200 hover:bg-white/10" aria-label="Open command palette"><Cmd className="h-4 w-4"/>Jump</button>
                        <button type="button" onClick={()=>dispatch({type:"UNDO"})} disabled={!history.past.length} className="inline-flex items-center gap-1 rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-sm font-bold text-slate-300 hover:bg-white/10 hover:text-white disabled:opacity-40" aria-label="Undo"><Undo className="h-4 w-4"/></button>
                        <button type="button" onClick={()=>dispatch({type:"REDO"})} disabled={!history.future.length} className="inline-flex items-center gap-1 rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-sm font-bold text-slate-300 hover:bg-white/10 hover:text-white disabled:opacity-40" aria-label="Redo"><Redo className="h-4 w-4"/></button>
                        <button type="button" onClick={()=>setFocusMode(!focusMode)} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-sm font-bold text-slate-300 hover:bg-white/10 hover:text-white" aria-pressed={focusMode}>{focusMode ? <EyeOff className="h-4 w-4"/> : <Eye className="h-4 w-4"/>}{focusMode ? "Focus On" : "Focus Off"}</button>
                        <button type="button" onClick={()=>downloadJSON(state)} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-sm font-bold text-slate-300 hover:bg-white/10 hover:text-white" aria-label="Backup as JSON"><Download className="h-4 w-4"/>JSON</button>
                        <button type="button" onClick={()=>fileInputRef.current?.click()} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-sm font-bold text-slate-300 hover:bg-white/10 hover:text-white" aria-label="Restore from JSON"><Upload className="h-4 w-4"/>Import</button>
                        <input ref={fileInputRef} type="file" accept="application/json" className="hidden" onChange={e=>{ const f = e.target.files?.[0]; if (f) handleImportFile(f); e.target.value = ""; }}/>
                        <button type="button" onClick={resetDashboard} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-sm font-bold text-slate-300 hover:bg-red-500/10 hover:text-red-100"><RotateCcw className="h-4 w-4"/>Reset</button>
                      </div>
                    </div>
                    <div className="mt-3"><Toolbar filters={filters} sortMode={sortMode} dispatch={dispatch}/></div>
                  </section>

                  <section className="mt-5 pb-12">
                    {activeTab === "command" && <CommandTab visibleTasks={filteredTasks} activeTask={activeTask} dispatch={dispatch} push={push} setActiveTab={setActiveTab} sortMode={sortMode} filters={filters}/>}
                    {["life-admin","dashboards","events","learning"].includes(activeTab) && <FilteredTaskGrid tasks={tasks} filter={activeTab} activeTaskId={activeTaskId} dispatch={dispatch} push={push} setActiveTab={setActiveTab}/>}
                    {activeTab === "notes" && <NotesTab tasks={tasks} savedNotes={savedNotes} globalNotes={globalNotes} noteDraft={noteDraft} dispatch={dispatch} push={push}/>}
                  </section>

                  <footer className="no-print pb-6 text-center text-xs text-slate-500">
                    Local autosave · Press <kbd className="rounded bg-white/10 px-1">⌘/Ctrl+K</kbd> to jump, <kbd className="rounded bg-white/10 px-1">N</kbd> for new task, <kbd className="rounded bg-white/10 px-1">⌘/Ctrl+E</kbd> to export.
                  </footer>
                </div>

                <CommandPalette open={paletteOpen} onClose={()=>setPaletteOpen(false)} tasks={tasks} dispatch={dispatch} setActiveTab={setActiveTab}/>
                <NewTaskModal open={newTaskOpen} onClose={()=>setNewTaskOpen(false)} onCreate={task => { dispatch({type:"ADD_TASK",task}); setActiveTab(task.tab); push("Task created",{tone:"success"}); }}/>
                <ToastHost toasts={toasts} dismiss={dismiss}/>
              </main>
            </ErrorBoundary>
          </ToastCtx.Provider>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App/>);
    </script>
  </body>
</html>
